<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Terminal — Classroom</title>

  <!-- xterm.js -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.min.js"></script>
  <link rel="stylesheet" href="/style.css"/>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon">&gt;_</div>
      Classroom Terminal
    </div>
    <div class="status-pill" id="statusPill">
      <div class="status-dot"></div>
      <span id="statusText">Connecting…</span>
    </div>
    <div class="spacer"></div>
  </header>

  <!-- Session tabs -->
  <div class="session-bar">
    <div class="tab active" id="tab-1">bash</div>
    <div class="tab-add" title="New tab (coming soon)">+</div>
  </div>

  <!-- Terminal -->
  <div class="terminal-wrap">
    <div class="terminal-frame">
      <div id="terminal"></div>
    </div>
  </div>

  <script>
    // ── xterm setup ──────────────────────────────────────────────────────────
    const term = new Terminal({
      fontFamily: '"JetBrains Mono", "Fira Code", monospace',
      fontSize: 14,
      lineHeight: 1.4,
      cursorBlink: true,
      cursorStyle: 'block',
      scrollback: 5000,
      theme: {
        background:      '#0a0c10',
        foreground:      '#c8d0e0',
        cursor:          '#00e5a0',
        cursorAccent:    '#0a0c10',
        selectionBackground: 'rgba(0,229,160,0.2)',
        black:   '#1e2230', brightBlack:   '#4a5270',
        red:     '#ff4f6d', brightRed:     '#ff7088',
        green:   '#00e5a0', brightGreen:   '#33ffb8',
        yellow:  '#ffcd40', brightYellow:  '#ffe080',
        blue:    '#00b8ff', brightBlue:    '#40cfff',
        magenta: '#c678dd', brightMagenta: '#d99fe8',
        cyan:    '#56d1e0', brightCyan:    '#80e8f0',
        white:   '#c8d0e0', brightWhite:   '#ffffff',
      }
    });

    const fitAddon = new FitAddon.FitAddon();
    const webLinksAddon = new WebLinksAddon.WebLinksAddon();
    term.loadAddon(fitAddon);
    term.loadAddon(webLinksAddon);
    term.open(document.getElementById('terminal'));
    fitAddon.fit();

    // ── WebSocket ────────────────────────────────────────────────────────────
    let ws = null;

    function setStatus(state, text) {
      const pill = document.getElementById('statusPill');
      const label = document.getElementById('statusText');
      pill.className = `status-pill ${state}`;
      label.textContent = text;
    }

    function showOverlay(show) {
      document.getElementById('overlay').classList.toggle('hidden', !show);
    }

    

    function connect() {
      const params = new URLSearchParams(window.location.search);
      const username = params.get('username');
      
      const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${protocol}://${location.host}?username=${username}`);

      ws.onopen = () => {
        setStatus('connected', 'Connected');
        showOverlay(false);
        // Send initial size
        ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
      };

      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'output') term.write(msg.data);
        if (msg.type === 'exit')   { setStatus('error', 'Session ended'); showOverlay(true); }
      };

      ws.onerror = () => setStatus('error', 'Connection error');

      ws.onclose = () => {
        setStatus('', 'Disconnected');
        showOverlay(true);
      };
    }

    // Terminal → server
    term.onData((data) => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'input', data }));
      }
    });

    // Resize → server
    const ro = new ResizeObserver(() => {
      fitAddon.fit();
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
      }
    });
    ro.observe(document.getElementById('terminal'));

    // ── Boot ─────────────────────────────────────────────────────────────────
    connect();
  </script>
</body>
</html>
