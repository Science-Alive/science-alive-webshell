<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Science Alive Terminal</title>

  <!-- xterm.js -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.min.js"></script>
  <link rel="stylesheet" href="/style.css"/>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon">&gt;_</div>
      <div class="logo-name">Science Alive Terminal</div>
    </div>
    <div class="status-pill" id="statusPill">
      <div class="status-dot"></div>
      <span id="statusText">Connecting…</span>
    </div>
    <div class="spacer"></div>
    <label class="theme-label" for="themeSelect">⚒ Theme</label>
    <select id="themeSelect" class="theme-select" title="Terminal color scheme"></select>
  </header>

  <!-- Terminal -->
  <div class="terminal-wrap">
    <div class="terminal-frame">
      <div id="terminal"></div>
    </div>
  </div>

  <script src="/themes.js"></script>
  <script>
    // ── xterm setup ──────────────────────────────────────────────────────────
    const initialTheme = getSavedTheme();

    const term = new Terminal({
      fontFamily: '"JetBrains Mono", "Fira Code", monospace',
      fontSize: 14,
      lineHeight: 1.4,
      cursorBlink: true,
      cursorStyle: 'block',
      scrollback: 5000,
      theme: THEMES[initialTheme].term,
    });

    // ── Theme selector (THEMES/applyTheme/buildThemeSelector come from themes.js) ──
    buildThemeSelector(document.getElementById('themeSelect'), initialTheme, () => term);
    applyTheme(initialTheme, term);

    const fitAddon = new FitAddon.FitAddon();
    const webLinksAddon = new WebLinksAddon.WebLinksAddon();
    term.loadAddon(fitAddon);
    term.loadAddon(webLinksAddon);
    term.open(document.getElementById('terminal'));
    fitAddon.fit();

    // ── WebSocket ────────────────────────────────────────────────────────────
    let ws = null;

    function setStatus(state, text) {
      const pill = document.getElementById('statusPill');
      const label = document.getElementById('statusText');
      pill.className = `status-pill ${state}`;
      label.textContent = text;
    }

    

    function connect() {
      const token = sessionStorage.getItem('token');

      // no session → back to the login page
      if (!token) {
        window.location.href = '/index.html';
        return;
      }

      const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${protocol}://${location.host}?token=${token}`);

      ws.onopen = () => {
        setStatus('connected', 'Connected');
        // Send initial size
    
        fitAddon.fit();
        ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
      };

      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'output') term.write(msg.data);
        if (msg.type === 'exit')   { setStatus('error', 'Session ended'); }
      };

      ws.onerror = () => setStatus('error', 'Connection error');

      ws.onclose = () => {
        setStatus('', 'Disconnected');
      };
    }

    // Terminal → server
    term.onData((data) => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'input', data }));
      }
    });

    // Resize → server
    const ro = new ResizeObserver(() => {
      fitAddon.fit();
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
      }
    });
    ro.observe(document.getElementById('terminal'));

    // ── Boot ─────────────────────────────────────────────────────────────────
    connect();
  </script>
</body>
</html>
