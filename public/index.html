<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <link rel="stylesheet" href="/style.css"/>
</head>
<body>

  <header>
    <div class="logo">
      <div class="logo-icon">&gt;_</div>
      <div class="logo-name">Science Alive Terminal</div>
    </div>
    <div class="spacer"></div>
    <label class="theme-label" for="themeSelect">⚒ Theme</label>
    <select id="themeSelect" class="theme-select" title="Color scheme"></select>
  </header>
  
  <div class="card">

    <label>Username</label>
    <input type="text" id="username"/>

    <label>Password</label>
    <input type="password" id="password"/>

    <button class="btn" id="loginBtn" onclick="submitLogin()">Log In</button>
    <a href="sign-up.html" class="redirect-button">Create Account</a>


    <div class="login-hints">
      <p>Admin username: ScienceAliveAdmin</p>
      <p>Guest create: ScienceAliveGuest + class password</p>
      <p>Guest log in: guestX + class password</p>
    </div>

    <div class="error" id="error"></div>
  </div>

  <script src="/themes.js"></script>
  <script src="/auth.js"></script>
  <script>
    // Apply saved theme and wire up the selector (helpers from themes.js).
    const savedTheme = getSavedTheme();
    buildThemeSelector(document.getElementById('themeSelect'), savedTheme);
    applyTheme(savedTheme);

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') submitLogin();
    });

    function submitLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');

      btn.disabled = true;
      btn.textContent = 'Logging in…';

      login(username, password, btn);
    }
  </script>
</body>
</html>
