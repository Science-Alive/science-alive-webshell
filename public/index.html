<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Terminal — Classroom</title>

  <!-- xterm.js -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0f14;
      --surface:  #13161e;
      --border:   #1e2230;
      --accent:   #00e5a0;
      --accent2:  #00b8ff;
      --danger:   #ff4f6d;
      --text:     #c8d0e0;
      --muted:    #4a5270;
      --header-h: 52px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      height: var(--header-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
      position: relative;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 17px;
      letter-spacing: -0.3px;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      width: 26px;
      height: 26px;
      background: var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
      font-size: 13px;
      font-weight: 700;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--muted);
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 20px;
      transition: all 0.3s;
    }

    .status-pill.connected { color: var(--accent); border-color: var(--accent); }
    .status-pill.error     { color: var(--danger); border-color: var(--danger); }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    .status-pill.connected .status-dot { animation: pulse 2s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    header .spacer { flex: 1; }

    .btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.3px;
    }

    .btn:hover { border-color: var(--accent); color: var(--accent); }

    .btn-danger:hover { border-color: var(--danger); color: var(--danger); }

    /* ── Session bar ── */
    .session-bar {
      height: 36px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 4px;
    }

    .tab {
      font-size: 11px;
      padding: 4px 14px;
      border-radius: 5px 5px 0 0;
      border: 1px solid transparent;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.15s;
      position: relative;
      top: 1px;
    }

    .tab.active {
      background: var(--surface);
      border-color: var(--border);
      border-bottom-color: var(--surface);
      color: var(--accent);
    }

    .tab:not(.active):hover { color: var(--text); }

    .tab-add {
      font-size: 16px;
      padding: 0 8px;
      color: var(--muted);
      cursor: pointer;
      line-height: 1;
    }

    .tab-add:hover { color: var(--accent); }

    /* ── Terminal area ── */
    .terminal-wrap {
      position: absolute;
      top: calc(var(--header-h) + 36px);
      left: 0; right: 0; bottom: 0;
      padding: 12px;
      background: var(--bg);
    }

    .terminal-frame {
      width: 100%;
      height: 100%;
      background: #0a0c10;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }

    /* subtle scanline texture */
    .terminal-frame::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
      pointer-events: none;
      z-index: 10;
      border-radius: 8px;
    }

    #terminal {
      width: 100%;
      height: 100%;
      padding: 8px;
    }

    /* Override xterm defaults */
    .xterm { height: 100%; }
    .xterm-viewport { border-radius: 0; }

    /* ── Disconnected overlay ── */
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(10, 12, 16, 0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 20;
      border-radius: 8px;
      backdrop-filter: blur(4px);
    }

    .overlay.hidden { display: none; }

    .overlay-title {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: #fff;
    }

    .overlay-sub {
      font-size: 12px;
      color: var(--muted);
    }

    .btn-primary {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      padding: 10px 24px;
      border-radius: 7px;
      border: none;
      background: var(--accent);
      color: #000;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn-primary:hover { opacity: 0.85; }

    /* ── Keyboard shortcut hints ── */
    .hints {
      position: absolute;
      bottom: 20px;
      right: 24px;
      display: flex;
      gap: 12px;
      z-index: 5;
    }

    .hint {
      font-size: 10px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .hint kbd {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 2px 5px;
      border-radius: 3px;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon">&gt;_</div>
      Classroom Terminal
    </div>
    <div class="status-pill" id="statusPill">
      <div class="status-dot"></div>
      <span id="statusText">Connecting…</span>
    </div>
    <div class="spacer"></div>
    <button class="btn" onclick="clearTerminal()">Clear</button>
    <button class="btn btn-danger" onclick="reconnect()">Reconnect</button>
  </header>

  <!-- Session tabs -->
  <div class="session-bar">
    <div class="tab active" id="tab-1">bash</div>
    <div class="tab-add" title="New tab (coming soon)">+</div>
  </div>

  <!-- Terminal -->
  <div class="terminal-wrap">
    <div class="terminal-frame">
      <div id="terminal"></div>

      <!-- Overlay shown when disconnected -->
      <div class="overlay hidden" id="overlay">
        <div class="overlay-title">Session Ended</div>
        <div class="overlay-sub">The shell process exited or the connection was lost.</div>
        <button class="btn-primary" onclick="reconnect()">Start New Session</button>
      </div>
    </div>

    <!-- Hints -->
    <div class="hints">
      <div class="hint"><kbd>Ctrl+C</kbd> interrupt</div>
      <div class="hint"><kbd>Ctrl+L</kbd> clear</div>
      <div class="hint"><kbd>Tab</kbd> autocomplete</div>
    </div>
  </div>

  <script>
    // ── xterm setup ──────────────────────────────────────────────────────────
    const term = new Terminal({
      fontFamily: '"JetBrains Mono", "Fira Code", monospace',
      fontSize: 14,
      lineHeight: 1.4,
      cursorBlink: true,
      cursorStyle: 'block',
      scrollback: 5000,
      theme: {
        background:      '#0a0c10',
        foreground:      '#c8d0e0',
        cursor:          '#00e5a0',
        cursorAccent:    '#0a0c10',
        selectionBackground: 'rgba(0,229,160,0.2)',
        black:   '#1e2230', brightBlack:   '#4a5270',
        red:     '#ff4f6d', brightRed:     '#ff7088',
        green:   '#00e5a0', brightGreen:   '#33ffb8',
        yellow:  '#ffcd40', brightYellow:  '#ffe080',
        blue:    '#00b8ff', brightBlue:    '#40cfff',
        magenta: '#c678dd', brightMagenta: '#d99fe8',
        cyan:    '#56d1e0', brightCyan:    '#80e8f0',
        white:   '#c8d0e0', brightWhite:   '#ffffff',
      }
    });

    const fitAddon = new FitAddon.FitAddon();
    const webLinksAddon = new WebLinksAddon.WebLinksAddon();
    term.loadAddon(fitAddon);
    term.loadAddon(webLinksAddon);
    term.open(document.getElementById('terminal'));
    fitAddon.fit();

    // ── WebSocket ────────────────────────────────────────────────────────────
    let ws = null;
    let sessionId = localStorage.getItem('termSessionId') || `s_${Math.random().toString(36).slice(2)}`;
    localStorage.setItem('termSessionId', sessionId);

    function setStatus(state, text) {
      const pill = document.getElementById('statusPill');
      const label = document.getElementById('statusText');
      pill.className = `status-pill ${state}`;
      label.textContent = text;
    }

    function showOverlay(show) {
      document.getElementById('overlay').classList.toggle('hidden', !show);
    }

    function connect() {
      const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${protocol}://${location.host}?session=${sessionId}`);

      ws.onopen = () => {
        setStatus('connected', 'Connected');
        showOverlay(false);
        // Send initial size
        ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
      };

      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'output') term.write(msg.data);
        if (msg.type === 'exit')   { setStatus('error', 'Session ended'); showOverlay(true); }
      };

      ws.onerror = () => setStatus('error', 'Connection error');

      ws.onclose = () => {
        setStatus('', 'Disconnected');
        showOverlay(true);
      };
    }

    // Terminal → server
    term.onData((data) => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'input', data }));
      }
    });

    // Resize → server
    const ro = new ResizeObserver(() => {
      fitAddon.fit();
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
      }
    });
    ro.observe(document.getElementById('terminal'));

    // ── Controls ─────────────────────────────────────────────────────────────
    function clearTerminal() {
      term.clear();
    }

    function reconnect() {
      if (ws) ws.close();
      // New session ID so the server spawns a fresh shell
      sessionId = `s_${Math.random().toString(36).slice(2)}`;
      localStorage.setItem('termSessionId', sessionId);
      term.reset();
      showOverlay(false);
      setStatus('', 'Connecting…');
      connect();
    }

    // ── Boot ─────────────────────────────────────────────────────────────────
    connect();
  </script>
</body>
</html>
