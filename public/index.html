<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Classroom Terminal</title>
  <link rel="stylesheet" href="/style.css"/>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">&gt;_</div>
      Classroom Terminal
    </div>
    <h2>Sign in to get started</h2>

    <label>Username</label>
    <input type="text" id="username"/>

    <label>Password</label>
    <input type="text" id="password"/>

    <button class="btn" id="loginBtn" onclick="login()">Sign In</button>
    <div class="error" id="error"></div>
  </div>

  <script>
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') login();
    });

    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const error = document.getElementById('error');

      if (!username || !password) {
        error.textContent = 'Please enter your username and password.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Signing in…';
      error.textContent = '';

      try {
        
        //send login request to server
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (!res.ok) {
          error.textContent = data.error || 'Login failed.';
          btn.disabled = false;
          btn.textContent = 'Sign In';
          return;
        }

        //if request successful redirect to terminal
        window.location.href = `/terminal.html?username=${username}`;

      } catch (e) {
        error.textContent = 'Could not reach the server.';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }
  </script>
</body>
</html>
