<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up</title>
  <link rel="stylesheet" href="/style.css"/>
</head>
<body>

  <header>
    <div class="logo">
      <div class="logo-icon">&gt;_</div>
      <div class="logo-name">Science Alive Terminal</div>
    </div>
    <div class="spacer"></div>
  </header>
  
  <div class="card">

    <label>Username</label>
    <input type="text" id="username"/>

    <label>Class Password</label>
    <input type="password" id="password"/>

    <button class="btn" id="signUpbtn" onclick="signUp()">Sign Up</button>

    <div class="error" id="error"></div>
  </div>

  <script src="/auth.js"></script>
  <script>
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') signUp();
    });

    async function signUp() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('signUpbtn');
      const error = document.getElementById('error');

      if (!username || !password) {
        error.textContent = 'Please enter your username and password.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Signing up…';
      error.textContent = '';

      try {
        const { res, data } = await postJson('/api/sign-up', { username, password });

        if (!res.ok) {
          error.textContent = data.error || 'Sign up failed.';
          btn.disabled = false;
          btn.textContent = 'Sign Up';
          return;
        }

        // on success, log straight in (shared helper redirects to the terminal)
        login(username, password, btn);

      } catch (e) {
        error.textContent = 'Could not reach the server.';
        btn.disabled = false;
        btn.textContent = 'Sign Up';
      }
    }
  </script>
</body>
</html>
