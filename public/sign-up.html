<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up</title>
  <link rel="stylesheet" href="/style.css"/>
</head>
<body>

  <header>
    <div class="logo">
      <div class="logo-icon">&gt;_</div>
      <div class="logo-name">Science Alive Terminal</div>
    </div>
    <div class="spacer"></div>
  </header>
  
  <div class="card">

    <label>Username</label>
    <input type="text" id="username"/>

    <label>Class Password</label>
    <input type="text" id="password"/>

    <button class="btn" id="signUpbtn" onclick="signUp()">Sign Up</button>

    <div class="error" id="error"></div>
  </div>

  <script>
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') signUp();
    });

    async function signUp() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('signUpbtn');
      const error = document.getElementById('error');

      if (!username || !password) {
        error.textContent = 'Please enter your username and password.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Signing up…';
      error.textContent = '';

      try {
        
        //send sign up request to server
        const res = await fetch('/api/sign-up', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (!res.ok) {
          error.textContent = data.error || 'Sign up failed.';
          btn.disabled = false;
          btn.textContent = 'Sign Up';
          return;
        }

        //if request successful call login function
        login(username, password);

      } catch (e) {
        error.textContent = 'Could not reach the server.';
        btn.disabled = false;
        btn.textContent = 'Sign Up';
      }
    }

    async function login(username, password) {
      const error = document.getElementById('error');

      if (!username || !password) {
        error.textContent = 'Error logging in.';
        return;
      }

      error.textContent = '';

      try {
        
        //send login request to server
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (!res.ok) {
          error.textContent = data.error || 'Login failed.';
          return;
        }
        
        sessionStorage.setItem('token', data.token)
        sessionStorage.setItem('username', data.username);

        //if request successful redirect to terminal
        window.location.href = `/terminal.html`;

      } catch (e) {
        error.textContent = 'Could not reach the server.';
        btn.disabled = false;
        btn.textContent = 'Log In';
      }
    }
  </script>
</body>
</html>
